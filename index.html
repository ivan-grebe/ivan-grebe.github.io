<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ivan Grebe</title>
    <meta name="description" content="Personal portfolio and blog">
    <style>
        @font-face {
            font-family: 'Courier Prime';
            font-style: normal;
            font-weight: 400;
            src: url('https://fonts.gstatic.com/s/courierprime/v9/u-450q2lgwslOqpF_6gQ8kELWwZjW-_-tvg.woff2') format('woff2');
        }
        
        @font-face {
            font-family: 'Courier Prime';
            font-style: normal;
            font-weight: 700;
            src: url('https://fonts.gstatic.com/s/courierprime/v9/u-4k0q2lgwslOqpF_6gQ8kELY7pMf-fVqvHoJXw.woff2') format('woff2');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier Prime', 'Courier New', monospace;
            background-color: #000;
            color: #fff;
            line-height: 1.7;
            min-height: 100vh;
        }

        body.custom-cursor {
            cursor: none;
        }

        a {
            color: #fff;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        a:hover {
            color: #888;
        }

        header {
            max-width: 42rem;
            margin: 0 auto;
            padding: 3rem 1.5rem 0;
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .social-links {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        hr {
            margin-top: 1.5rem;
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        main {
            max-width: 42rem;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        .content {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        blockquote {
            margin-top: 2rem;
            border-left: 2px solid #fff;
            padding-left: 1.5rem;
            margin-left: 1rem;
            max-width: 28rem;
        }

        blockquote p {
            font-style: italic;
        }

        svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .x-icon {
            font-size: 1.25rem;
            font-weight: 700;
        }

        /* Custom Cursor */
        #cursor {
            width: 48px;
            height: 48px;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
            transform-origin: top left;
            opacity: 0;
        }

        body.custom-cursor #cursor { opacity: 1; }
        #cursor img { width: 100%; height: 100%; image-rendering: pixelated; }
        #cursor.hover { transform: scale(1.2); }
        body.custom-cursor a, body.custom-cursor button { cursor: none; }

        /* Video Styles */
        .random-video {
            display: none;
            position: fixed;
            height: auto;
            object-fit: contain;
            border: none;
            outline: none;
            box-shadow: none;
        }
        #babyboo-video { z-index: 9998; }
        #slime-video { z-index: 9997; }
        #beast-video { z-index: 9996; }

        /* Hire Me Block Styles */
        #hire-me-container {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10000;
            text-align: center;
        }
        .hire-text {
            color: red;
            font-size: 6rem;
            font-weight: 900;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .arrow {
            position: absolute;
            width: 180px; 
            display: none;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            nav { flex-direction: column; gap: 1rem; }
            .nav-links { flex-direction: column; gap: 0.5rem; }
            #cursor, .arrow { display: none; }
            .hire-text { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <div id="cursor">
        <img src="assets/diamond-sword.png" alt="">
    </div>

    <div id="hire-me-container">
        <img src="assets/red_arrow.png" class="arrow" id="arrow-0" alt="">
        <img src="assets/red_arrow.png" class="arrow" id="arrow-1" alt="">
        <img src="assets/red_arrow.png" class="arrow" id="arrow-2" alt="">
        <div class="hire-text">HIRE ME!!!</div>
    </div>

    <video id="babyboo-video" class="random-video" src="assets/babyboo.mp4" loop playsinline disablePictureInPicture controlsList="nopictureinpicture"></video>
    <video id="slime-video" class="random-video" src="assets/slime.webm" loop playsinline disablePictureInPicture controlsList="nopictureinpicture"></video>
    <video id="beast-video" class="random-video" src="assets/beast.webm" loop playsinline disablePictureInPicture controlsList="nopictureinpicture"></video>
    
    <audio id="ding-sound" src="assets/ding.mp3"></audio>

    <header>
        <nav>
            <a href="/" class="logo">Ivan Grebe</a>
            <div class="nav-links">
                <a href="/blog">Blog</a>
                <a href="/personal">Personal</a>
                <a href="/portfolio">Portfolio</a>
                <div class="social-links">
                    <a href="https://github.com/ivan-grebe" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                    </a>
                    <a href="https://x.com/Fortnite" target="_blank" rel="noopener noreferrer" aria-label="X (Twitter)" class="x-icon">𝕏</a>
                    <a href="https://www.linkedin.com/in/ivan-grebe" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                    </a>
                </div>
            </div>
        </nav>
        <hr>
    </header>

    <main>
        <div class="content">
            <section>
                <p>I'm trying to understand how to make worse decisions under certainty.</p>
                <p>My interests include Fortnite, Arc Raiders, Looksmaxxing, gambling, inference, and poker.</p>
            </section>
            <section>
                <blockquote><p>"Disagreement is the highest form of disrespect."</p></blockquote>
            </section>
        </div>
    </main>

    <script>
        const cursor = document.getElementById('cursor');
        const babyboo = document.getElementById('babyboo-video');
        const slime = document.getElementById('slime-video');
        const beast = document.getElementById('beast-video');
        const hireMe = document.getElementById('hire-me-container');
        const ding = document.getElementById('ding-sound');
        
        let customCursorEnabled = false;
        let mouseX = 0, mouseY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX; mouseY = e.clientY;
            if (customCursorEnabled) { cursor.style.left = mouseX + 'px'; cursor.style.top = mouseY + 'px'; }
        });

        const dCursor = Math.floor(Math.random() * 6001) + 3000;
        const dBaby = Math.floor(Math.random() * 3001) + 3000;
        const dSlime = Math.floor(Math.random() * 4001) + 8000;
        const dBeast = Math.floor(Math.random() * 4001) + 14000;
        const dHire = Math.floor(Math.random() * 5001) + 20000;

        setTimeout(() => {
            cursor.style.left = mouseX + 'px'; cursor.style.top = mouseY + 'px';
            document.body.classList.add('custom-cursor'); customCursorEnabled = true;
        }, dCursor);

        const unlockAudio = () => {
            [babyboo, slime, beast].forEach(v => { if(v.style.display === 'block') v.play(); });
            window.removeEventListener('click', unlockAudio);
        };
        window.addEventListener('click', unlockAudio);

        function isOverlapping(r1, r2) {
            return !(r1.right < r2.left || r1.left > r2.right || r1.bottom < r2.top || r1.top > r2.bottom);
        }

        function positionVideo(video, otherVideos) {
            // Volume reduced to 0.02
            if (video.id === 'beast-video') video.volume = 0.02;
            
            // Slime minimum size set to 50%
            let minW = 150;
            if (video.id === 'beast-video') minW = window.innerWidth * 0.4;
            if (video.id === 'slime-video') minW = window.innerWidth * 0.5;

            const safeMaxW = Math.min(window.innerWidth * 0.8, (window.innerHeight * 0.8) / 1.77);
            const actualMinW = Math.min(minW, safeMaxW);
            const rWidth = Math.floor(Math.random() * (safeMaxW - actualMinW + 1)) + actualMinW;
            
            video.style.width = rWidth + 'px';
            video.style.display = 'block';
            
            const rect = video.getBoundingClientRect();
            let attempts = 0, x, y;
            do {
                x = Math.floor(Math.random() * (window.innerWidth - rect.width));
                y = Math.floor(Math.random() * (window.innerHeight - rect.height));
                video.style.left = x + 'px'; video.style.top = y + 'px';
                let overlap = false;
                for (const other of otherVideos) {
                    if (window.getComputedStyle(other).display !== 'none' && isOverlapping(video.getBoundingClientRect(), other.getBoundingClientRect())) {
                        overlap = true; break;
                    }
                }
                if (!overlap) break;
                attempts++;
            } while (attempts < 50);

            // Always plays even if overlapping spots couldn't be found
            video.play().catch(() => {});
        }

        setTimeout(() => positionVideo(babyboo, [slime, beast]), dBaby);
        setTimeout(() => positionVideo(slime, [babyboo, beast]), dSlime);
        setTimeout(() => positionVideo(beast, [babyboo, slime]), dBeast);
        
        // Random Arrow Logic
        setTimeout(() => {
            hireMe.style.display = 'block';
            const arrows = hireMe.querySelectorAll('.arrow');
            
            const showRandomArrow = (index, delay) => {
                setTimeout(() => {
                    const arrow = arrows[index];
                    const angle = Math.random() * Math.PI * 2;
                    const radius = Math.floor(Math.random() * 101) + 250;
                    
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;
                    
                    // Since original points LEFT (180 deg), we subtract 180 to correct the orientation
                    const angleToCenter = Math.atan2(-y, -x) * (180 / Math.PI);
                    const rot = angleToCenter - 180;
                    
                    arrow.style.left = `calc(50% + ${x}px)`;
                    arrow.style.top = `calc(50% + ${y}px)`;
                    arrow.style.transform = `translate(-50%, -50%) rotate(${rot}deg)`;
                    arrow.style.display = 'block';

                    const s = ding.cloneNode(true);
                    s.play().catch(() => {});
                }, delay);
            };

            showRandomArrow(0, 0);
            showRandomArrow(1, 600);
            showRandomArrow(2, 1200);
        }, dHire);

        document.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('mouseenter', () => { if (customCursorEnabled) cursor.classList.add('hover'); });
            el.addEventListener('mouseleave', () => { if (customCursorEnabled) cursor.classList.remove('hover'); });
        });
    </script>
</body>
</html>
