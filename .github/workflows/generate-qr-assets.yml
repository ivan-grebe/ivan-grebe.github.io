name: Generate QR assets

on:
  push:
    branches:
      - main
    paths:
      - config.json
      - scripts/generate_qr_assets.py
      - .github/workflows/generate-qr-assets.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pillow

      - name: Generate QR assets
        run: python scripts/generate_qr_assets.py

      - name: Commit regenerated QR assets
        run: |
          if git diff --quiet -- assets/qr-1.png assets/qr-2.png; then
            echo "QR assets are already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/qr-1.png assets/qr-2.png
          git commit -m "Regenerate QR assets"
          git push
